<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D Compendium</title>
  <link rel="stylesheet" href="index.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <img src="icon.png" alt="D&D Logo">
        <h1>Compendium</h1>
      </div>
      <ul class="sidebar-menu">
        <li class="menu-item" data-category="search">
          <button>
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>Search</span>
          </button>
        </li>
        <li class="menu-item active" data-category="spells">
          <button>
            <svg viewBox="0 0 24 24"><path d="M12 2c1.1 0 2 .9 2 2v2.22c3.4.8 6 3.82 6 7.48a7.84 7.84 0 0 1-2.3 5.5l1.42 1.42C21.09 18.66 22 15.93 22 13c0-4.9-3.6-9-8.4-9.8C13.4 2.4 12.8 2 12 2zm0 18c-3.87 0-7-3.13-7-7 0-2.45 1.25-4.6 3.16-5.88l-1.42-1.42C4.3 7.6 3 10.15 3 13c0 4.9 3.6 9 8.4 9.8.2-1.2.8-1.6 1.6-1.8V18.2c-.67-.2-1.34-.2-2-.2zm5-7c0-2.76-2.24-5-5-5s-5 2.24-5 5 2.24 5 5 5 5-2.24 5-5z"/></svg>
            <span>Spells</span>
          </button>
        </li>
        <li class="menu-item" data-category="items">
          <button>
            <svg viewBox="0 0 24 24"><path d="M20 3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm6 12H6v-1.5c0-1.99 4-3 6-3s6 1.01 6 3V18z"/></svg>
            <span>Items</span>
          </button>
        </li>
        <li class="menu-item" data-category="monsters">
          <button>
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/></svg>
            <span>Bestiary</span>
          </button>
        </li>
        <li class="menu-item" data-category="classes">
          <button>
            <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.89 12.5L12 15.82l6.11-3.32-6.11-3.33-6.11 3.33zM12 22l-11-6 11 6 11-6-11 6z"/></svg>
            <span>Classes</span>
          </button>
        </li>
        <li class="menu-item" data-category="feats">
          <button>
            <svg viewBox="0 0 24 24"><path d="M12 11.55C9.64 9.35 6.48 8 3 8v11c3.48 0 6.64 1.35 9 3.55 2.36-2.2 5.52-3.55 9-3.55V8c-3.48 0-6.64 1.35-9 3.55zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
            <span>Feats</span>
          </button>
        </li>
        <li class="menu-item" data-category="backgrounds">
          <button>
            <svg viewBox="0 0 24 24"><path d="M12 2c1.1 0 2 .9 2 2v2c0 1.1-.9 2-2 2s-2-.9-2-2V4c0-1.1.9-2 2-2zm0 14c-1.1 0-2-.9-2-2v-2c0-1.1.9-2 2-2s2 .9 2 2v2c0 1.1-.9 2-2 2zm8-6c1.1 0 2 .9 2 2v2c0 1.1-.9 2-2 2s-2-.9-2-2v-2c0-1.1.9-2 2-2zM4 10c1.1 0 2 .9 2 2v2c0 1.1-.9 2-2 2s-2-.9-2-2v-2c0-1.1.9-2 2-2z"/></svg>
            <span>Backgrounds</span>
          </button>
        </li>
        <li class="menu-item" data-category="races">
          <button>
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span>Races</span>
          </button>
        </li>
      </ul>
      <div class="sidebar-footer">
        <button class="settings-btn" id="btn-settings">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
          <span>Settings</span>
        </button>
        <input type="file" id="file-input" accept=".xml" style="display: none;">
        <div class="db-status" id="db-status">Offline Compendium</div>
      </div>
    </nav>

    <!-- Multi-Pane Content Area -->
    <main class="panes-container">
      
      <!-- Drill Down Facet 1 (Class, Category, CR, Type) -->
      <section class="pane facet-pane-1" id="pane-facet-1">
        <header class="pane-header">
          <button class="back-btn" id="back-facet-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            <span>Back</span>
          </button>
          <h2 id="facet-title-1">Facet 1</h2>
        </header>
        <div class="pane-content">
          <ul class="facet-list" id="facet-list-1">
            <!-- Dynamic Facets -->
          </ul>
        </div>
      </section>

      <!-- Drill Down Facet 2 (Level, Type) -->
      <section class="pane facet-pane-2" id="pane-facet-2">
        <header class="pane-header">
          <button class="back-btn" id="back-facet-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            <span>Back</span>
          </button>
          <h2 id="facet-title-2">Facet 2</h2>
        </header>
        <div class="pane-content">
          <ul class="facet-list" id="facet-list-2">
            <!-- Dynamic Facets -->
          </ul>
        </div>
      </section>

      <!-- Search & Item List Pane -->
      <section class="pane list-pane" id="pane-list">
        <header class="pane-header">
          <button class="back-btn" id="back-list">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            <span>Back</span>
          </button>
          <h2 id="list-title">Spells</h2>
        </header>
        
        <div class="search-container">
          <div class="search-box-wrapper" id="search-wrapper">
            <!-- Chits will render here -->
            <input type="text" class="search-input" id="search-input" placeholder="Search compendium...">
          </div>
          <div class="filter-dropdown-container" id="filter-dropdown-container">
            <!-- Custom filters dynamically populated -->
          </div>
        </div>

        <div class="pane-content">
          <ul class="item-list" id="item-list">
            <!-- Dynamic Records -->
          </ul>
        </div>
      </section>

      <!-- Details Display Pane -->
      <section class="pane detail-pane" id="pane-detail">
        <header class="pane-header" style="background-color: var(--bg-color)">
          <button class="back-btn" id="back-detail">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            <span>Back</span>
          </button>
          <h2>Details</h2>
        </header>
        <div class="pane-content" id="detail-pane-content">
          <!-- Dynamic details content formatted like an e-reader page -->
          <div class="detail-view-container">
            <div style="text-align: center; margin-top: 80px; color: var(--text-muted)">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom: 16px"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
              <p>Select an entry from the list to view its details.</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Database Setup Overlay (Fetching/Loading) -->
      <div class="overlay" id="loading-overlay" style="display: none;">
        <div class="overlay-card">
          <div class="spinner"></div>
          <h3 class="overlay-title" id="overlay-title">Seeding Database...</h3>
          <p class="overlay-desc" id="overlay-desc">Please wait while the System Reference Document is parsed and stored locally.</p>
        </div>
      </div>

    </main>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    // Register PWA service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then((reg) => {
          console.log('ServiceWorker registered with scope:', reg.scope);
        }).catch((err) => {
          console.error('ServiceWorker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
