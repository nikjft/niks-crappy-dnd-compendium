<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D Compendium</title>
  <link rel="stylesheet" href="index.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <img src="icon.png" alt="D&D Logo">
        <h1>Compendium</h1>
      </div>
      <ul class="sidebar-menu">
        <li class="menu-item" data-category="search">
          <button>
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>Search</span>
          </button>
        </li>
        <li class="menu-item active" data-category="races">
          <button>
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
            <span>Races</span>
          </button>
        </li>
        <li class="menu-item" data-category="classes">
          <button>
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12z"/></svg>
            <span>Classes</span>
          </button>
        </li>
        <li class="menu-item" data-category="backgrounds">
          <button>
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <span>Backgrounds</span>
          </button>
        </li>
        <li class="menu-item" data-category="feats">
          <button>
            <svg viewBox="0 0 24 24"><path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-12c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
            <span>Feats</span>
          </button>
        </li>
        <li class="menu-item" data-category="options">
          <button>
            <svg viewBox="0 0 24 24"><path d="M7.5 5.6L10 7 8.6 4.5 10 2 7.5 3.4 5 2l1.4 2.5L5 7zm12 9.8l-2.5-1.4 1.4 2.5-1.4 2.5 2.5-1.4 2.5 1.4-1.4-2.5 1.4-2.5zm0-9.8L17 7l1.4-2.5L17 2l2.5 1.4L22 2l-1.4 2.5L22 7zM13.3 9l-9 9 .7.7 9-9-.7-.7zm1.4-1.4L16 9l-11.8 11.8c-.39.39-1.02.39-1.41 0l-.8-.8c-.39-.39-.39-1.02 0-1.41L14.7 7.6z"/></svg>
            <span>Options</span>
          </button>
        </li>
        <li class="menu-item" data-category="items">
          <button>
            <svg viewBox="0 0 24 24"><path d="M19.36 4.64a2 2 0 0 0-2.83 0l-4.24 4.24-1.41-1.41-1.42 1.41 1.41 1.42-4.24 4.24a1 1 0 0 0 0 1.42l1.42 1.41-5.66 5.66 1.42 1.42 5.66-5.66 1.41 1.42a1 1 0 0 0 1.42 0l4.24-4.24 1.42 1.41 1.41-1.41-1.41-1.42 4.24-4.24a2 2 0 0 0 0-2.83zm-7.07 9.9l-1.41-1.42 4.24-4.24 1.41 1.42z"/></svg>
            <span>Equipment</span>
          </button>
        </li>
        <li class="menu-item" data-category="spells">
          <button>
            <svg viewBox="0 0 24 24"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5 9-2.5-9-2.5zm7.5 5l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z"/></svg>
            <span>Spells</span>
          </button>
        </li>
        <li class="menu-item" data-category="monsters">
          <button>
            <svg viewBox="0 0 24 24"><path d="M12 2a9 9 0 0 0-9 9c0 2.24.81 4.29 2.16 5.86l.84.87V20a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-2.27l.84-.87A8.97 8.97 0 0 0 21 11a9 9 0 0 0-9-9zm-3 8a2 2 0 1 1 2 2 2 2 0 0 1-2-2zm6 0a2 2 0 1 1 2 2 2 2 0 0 1-2-2zm-3 8a3 3 0 0 1-3-3h6a3 3 0 0 1-3 3z"/></svg>
            <span>Bestiary</span>
          </button>
        </li>
      </ul>
      <div class="sidebar-footer">
        <button class="settings-btn" id="btn-settings">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
          <span>Settings</span>
        </button>
        <input type="file" id="file-input" accept=".xml" style="display: none;">
        <div class="db-status" id="db-status">Offline Compendium</div>
      </div>
    </nav>

    <!-- Multi-Pane Content Area -->
    <main class="panes-container">
      
      <!-- Drill Down Facet 1 (Class, Category, CR, Type) -->
      <section class="pane facet-pane-1" id="pane-facet-1">
        <header class="pane-header">
          <button class="back-btn" id="back-facet-1" aria-label="Go back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <h2 id="facet-title-1">Facet 1</h2>
        </header>
        <div class="pane-content">
          <ul class="facet-list" id="facet-list-1">
            <!-- Dynamic Facets -->
          </ul>
        </div>
      </section>

      <!-- Drill Down Facet 2 (Level, Type) -->
      <section class="pane facet-pane-2" id="pane-facet-2">
        <header class="pane-header">
          <button class="back-btn" id="back-facet-2" aria-label="Go back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <h2 id="facet-title-2">Facet 2</h2>
        </header>
        <div class="pane-content">
          <ul class="facet-list" id="facet-list-2">
            <!-- Dynamic Facets -->
          </ul>
        </div>
      </section>

      <!-- Search & Item List Pane -->
      <section class="pane list-pane" id="pane-list">
        <header class="pane-header">
          <button class="back-btn" id="back-list" aria-label="Go back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <h2 id="list-title">Spells</h2>
        </header>
        
        <div class="search-container">
          <div class="search-box-wrapper" id="search-wrapper">
            <!-- Chits will render here -->
            <input type="text" class="search-input" id="search-input" placeholder="Search compendium...">
          </div>
          <div class="filter-dropdown-container" id="filter-dropdown-container">
            <!-- Custom filters dynamically populated -->
          </div>
        </div>

        <div class="pane-content">
          <ul class="item-list" id="item-list">
            <!-- Dynamic Records -->
          </ul>
        </div>
      </section>

      <!-- Details Display Pane -->
      <section class="pane detail-pane" id="pane-detail">
        <header class="pane-header" style="background-color: var(--bg-color)">
          <button class="back-btn" id="back-detail" aria-label="Go back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <h2>Details</h2>
        </header>
        <div class="pane-content" id="detail-pane-content">
          <!-- Dynamic details content formatted like an e-reader page -->
          <div class="detail-view-container">
            <div style="text-align: center; margin-top: 80px; color: var(--text-muted)">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom: 16px"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
              <p>Select an entry from the list to view its details.</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Database Setup Overlay (Fetching/Loading) -->
      <div class="overlay" id="loading-overlay" style="display: none;">
        <div class="overlay-card">
          <div class="spinner"></div>
          <h3 class="overlay-title" id="overlay-title">Seeding Database...</h3>
          <p class="overlay-desc" id="overlay-desc">Please wait while the System Reference Document is parsed and stored locally.</p>
        </div>
      </div>

    </main>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    // Register PWA service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then((reg) => {
          console.log('ServiceWorker registered with scope:', reg.scope);
        }).catch((err) => {
          console.error('ServiceWorker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
